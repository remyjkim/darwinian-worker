name: CLI CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: '1.2.21'

jobs:
  validate:
    name: Validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + integration tests
        run: bun test

      - name: Release-readiness gate
        if: runner.os == 'Linux'
        run: bun run verify:release

  linux-secret-tool:
    name: Linux secret-tool backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the Secret Service stack
        run: sudo apt-get update && sudo apt-get install -y libsecret-tools gnome-keyring dbus-x11

      - name: Exercise the real secret-tool backend under an unlocked keyring
        run: |
          dbus-run-session -- bash -c '
            echo -n "" | gnome-keyring-daemon --unlock --components=secrets,pkcs11
            bun test test/core-secret-store-backends.test.ts
          '
