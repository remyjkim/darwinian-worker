name: CLI CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: '1.2.21'
  # Fail fast on any git credential prompt instead of blocking on a missing TTY.
  GIT_TERMINAL_PROMPT: '0'

jobs:
  validate:
    name: Validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    # Windows runs for visibility but does not block merges: full Windows-green is
    # tracked as its own phased effort (see .ai/analyses/81 — node-tar tree extraction
    # and platform-aware path assertions remain). Linux stays a required gate.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + integration tests
        # A per-test timeout converts any CI-only spawn hang into a fast failure so the
        # suite always completes (and reports the culprit) instead of burning the job timeout.
        run: bun test --timeout 30000

      - name: Release-readiness gate
        if: runner.os == 'Linux'
        # Test mode runs the release-specific checks (metadata, docs, package contents,
        # schema reachability) without re-running the full bun test / typecheck suite —
        # those already ran as their own steps above. Re-running them here is redundant
        # and previously hung the job until its timeout.
        env:
          QUALITY_GATE_TEST_MODE: '1'
        run: bun run verify:release

  linux-secret-tool:
    name: Linux secret-tool backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the Secret Service stack
        run: sudo apt-get update && sudo apt-get install -y libsecret-tools gnome-keyring dbus-x11

      # Best-effort: a headless gnome-keyring is finicky to initialize, so this job is
      # non-blocking. When the keyring comes up cleanly it provides real secret-tool coverage.
      - name: Exercise the real secret-tool backend under an unlocked keyring
        continue-on-error: true
        run: |
          dbus-run-session -- bash -c '
            rm -rf "$HOME/.local/share/keyrings"
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets,pkcs11)"
            export GNOME_KEYRING_CONTROL
            bun test test/core-secret-store-backends.test.ts
          '
