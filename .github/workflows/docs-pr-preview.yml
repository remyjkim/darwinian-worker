name: docs PR preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'docs-docusaurus/**'
      - 'test/docs-readiness.test.ts'
      - 'test/package-readiness.test.ts'
      - '.github/workflows/docs-*.yml'
      - 'lychee.toml'

concurrency:
  group: docs-pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: '1.2.21'
  CF_PAGES_PROJECT: darwiniantools-docs

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install root deps
        run: bun install --frozen-lockfile

      # Root typecheck (`tsc --noEmit` on cli/*) is the CLI pipeline's concern,
      # not the docs pipeline's. Keep CLI-vs-docs CI boundaries clean so a
      # half-finished CLI refactor never blocks a docs typo fix from shipping.
      - name: Docs readiness tests
        run: bun test test/docs-readiness.test.ts test/package-readiness.test.ts

      - name: Install docusaurus deps
        working-directory: docs-docusaurus
        run: bun install --frozen-lockfile

      - name: Typecheck docusaurus
        working-directory: docs-docusaurus
        run: bun run typecheck

      - name: Build docusaurus
        working-directory: docs-docusaurus
        run: bun run build

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build-${{ github.event.pull_request.number }}
          path: docs-docusaurus/build
          retention-days: 7

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress docs-docusaurus/build
          fail: true

  deploy_preview:
    name: deploy preview
    runs-on: ubuntu-latest
    needs: validate

    # Refuse to deploy untrusted fork PRs because Cloudflare tokens are repo secrets.
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: docusaurus-build-${{ github.event.pull_request.number }}
          path: docs-docusaurus/build

      - name: Deploy to Cloudflare Pages preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN_NONPROD }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-docusaurus/build --project-name=${{ env.CF_PAGES_PROJECT }} --branch=pr-${{ github.event.pull_request.number }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test preview
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          curl -fsS --retry 5 --retry-delay 3 --retry-connrefused "${PREVIEW_URL}" -o /dev/null
          echo "Preview reachable: ${PREVIEW_URL}"

      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          BRANCH_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          gh pr comment "$PR" --body "📘 docs preview deployed

          - Preview: ${PREVIEW_URL}
          - Branch alias: ${BRANCH_ALIAS_URL}

          Smoke test passed."
