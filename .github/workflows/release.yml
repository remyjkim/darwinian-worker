name: CLI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match package.json). For tag-push, leave blank.'
        required: false
        type: string
      dry_run:
        description: 'Run all checks but skip npm publish.'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  BUN_VERSION: '1.2.21'

jobs:
  validate:
    name: Validate release commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.read_version.outputs.version }}
      tag: ${{ steps.read_version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read package version
        id: read_version
        run: |
          PKG_VERSION="$(bun -e 'console.log(require("./package.json").version)')"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            EXPECTED="v${PKG_VERSION}"
            if [ "$TAG" != "$EXPECTED" ]; then
              echo "Tag $TAG does not match package.json version ($EXPECTED)" >&2
              exit 1
            fi
          else
            TAG="v${PKG_VERSION}"
            INPUT_VERSION="${{ inputs.version }}"
            if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
              echo "Input version $INPUT_VERSION does not match package.json ($PKG_VERSION)" >&2
              exit 1
            fi
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + integration tests
        run: bun test

      - name: Release-readiness gate
        run: bun run verify:release

  publish:
    name: Publish to npm
    needs: [validate]
    if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/darwinian-minds
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Re-run release-readiness gate
        run: bun run verify:release

      - name: Verify package not already published
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if npm view "darwinian-minds@${VERSION}" version >/dev/null 2>&1; then
            echo "darwinian-minds@${VERSION} already exists on npm" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke install (ubuntu)
        run: |
          npm install -g "darwinian-minds@${{ needs.validate.outputs.version }}"
          drwn --version
          test "$(drwn --version | tr -d '[:space:]')" = "${{ needs.validate.outputs.version }}"

  dry_run_complete:
    name: Dry run complete
    needs: [validate]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read

    steps:
      - name: Summarize dry run
        run: |
          {
            echo "## release dry run complete"
            echo ""
            echo "- Version: ${{ needs.validate.outputs.version }}"
            echo "- Publish skipped by workflow_dispatch dry_run=true"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke_macos:
    name: Smoke install (macos)
    needs: [validate, publish]
    if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Smoke install (macos)
        run: |
          npm install -g "darwinian-minds@${{ needs.validate.outputs.version }}"
          drwn --version
          test "$(drwn --version | tr -d '[:space:]')" = "${{ needs.validate.outputs.version }}"

  github_release:
    name: GitHub Release
    needs: [validate, publish, smoke_macos]
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          ANNOTATION=""
          if [ "$(git cat-file -t "$TAG")" = "tag" ]; then
            ANNOTATION="$(git tag -l --format='%(contents)' "$TAG")"
          fi
          if [ -n "$ANNOTATION" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$ANNOTATION" \
              --generate-notes \
              --verify-tag
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
